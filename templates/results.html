<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🏆 Top Candidates</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Category</th>
            <th>Score</th>
        </tr>

        {% for row in tables %}
        <tr>
            <td>{{ row.ID }}</td>
            <td>{{ row.Category }}</td>
            <td class="score">{{ "%.2f"|format(row.score) }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/" class="back-btn">⬅ Go Back</a>
</div>

</body>
</html>
